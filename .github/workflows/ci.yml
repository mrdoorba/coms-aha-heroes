name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  # PRs only — on push to main, the Deploy workflow runs the same verify
  # jobs in parallel with the Docker build to shave the CI→Deploy gap.
  pull_request:
    branches:
      - main

# Cancel superseded runs on the same ref so a force-push or rapid follow-up
# commit doesn't keep an obsolete run burning a runner.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Default to read-only on the GITHUB_TOKEN; jobs that need more must opt in.
permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2
        with:
          bun-version: 1.3.13
      - name: Cache bun install
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Lint
        run: bun run lint

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2
        with:
          bun-version: 1.3.13
      - name: Cache bun install
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Type check
        run: bun run typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2
        with:
          bun-version: 1.3.13
      - name: Cache bun install
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Test
        run: bun test

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2
        with:
          bun-version: 1.3.13
      - name: Cache bun install
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build
        run: bun run build

  infra:
    name: OpenTofu Validate
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: infra

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@fc711fa910b93cba0f3fbecaafc9f42fd0c411cb  # v2

      - name: OpenTofu init (no backend)
        run: tofu init -backend=false -input=false

      - name: OpenTofu validate
        run: tofu validate

  # ─────────────────────────────────────────────────────────────────────────────
  # Drift guard — fails the PR if `tofu plan` detects any add/change/destroy
  # against live state. Forces a developer to confront infra drift at PR time
  # instead of letting it accumulate (issue #5).
  #
  # Gated on `vars.INFRA_PLAN_GUARD_ENABLED == 'true'` so the job stays a no-op
  # until the deployer SA has the read scopes it needs:
  #   - roles/storage.objectViewer on gs://coms-aha-heroes-tfstate
  #     (to read state — `-lock=false` skips the lock write)
  #   - roles/viewer on var.project_id (to read all managed resources)
  # When those grants are live, set the repo variable
  #   `gh variable set INFRA_PLAN_GUARD_ENABLED --body true`
  # to flip this on. Until then, the job is skipped and PRs pass.
  # ─────────────────────────────────────────────────────────────────────────────
  infra-plan:
    name: OpenTofu Plan (drift guard)
    runs-on: ubuntu-latest
    if: vars.INFRA_PLAN_GUARD_ENABLED == 'true'
    permissions:
      contents: read
      id-token: write  # WIF needs to mint an OIDC token
      pull-requests: write  # post plan summary as PR comment on drift
    defaults:
      run:
        working-directory: infra
    env:
      TF_INPUT: '0'
      # Plan needs the same input variables that `tofu apply` resolves locally.
      # alert_email is the only required (non-default) variable today.
      TF_VAR_alert_email: ${{ vars.ALERT_EMAIL }}
      TF_VAR_sheet_id_points: ${{ vars.SHEET_ID_POINTS }}
      TF_VAR_sheet_id_employees: ${{ vars.SHEET_ID_EMPLOYEES }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Authenticate to GCP (WIF → deployer SA)
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093  # v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@fc711fa910b93cba0f3fbecaafc9f42fd0c411cb  # v2

      - name: OpenTofu init (with backend)
        run: tofu init -input=false

      # `-detailed-exitcode` returns 0 (no drift), 1 (error), or 2 (drift).
      # `-lock=false` skips the state-lock write so a read-only viewer SA
      # without storage.objectAdmin can still plan.
      - name: OpenTofu plan
        id: plan
        run: |
          set +e
          tofu plan -detailed-exitcode -lock=false -no-color -out=tfplan.bin > plan.txt 2>&1
          ec=$?
          set -e
          {
            echo 'plan<<EOF_PLAN'
            cat plan.txt
            echo 'EOF_PLAN'
          } >> "$GITHUB_OUTPUT"
          echo "exitcode=${ec}" >> "$GITHUB_OUTPUT"
          if [ "$ec" = "0" ]; then
            echo "::notice::tofu plan clean — no drift."
          elif [ "$ec" = "2" ]; then
            echo "::error::tofu plan detected drift. See plan output below."
            tail -n 200 plan.txt
            exit 1
          else
            echo "::error::tofu plan failed (exit $ec). See plan output below."
            tail -n 200 plan.txt
            exit "$ec"
          fi
