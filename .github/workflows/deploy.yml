name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  id-token: write
  contents: read

env:
  PROJECT_ID: fbi-dev-484410
  REGION: asia-southeast2
  REGISTRY: asia-southeast2-docker.pkg.dev
  REPOSITORY: coms-aha-heroes-repo
  SERVICE: coms-aha-heroes-app
  # Full connection name used by Cloud SQL Auth Proxy and Cloud Run volume
  DB_INSTANCE: fbi-dev-484410:asia-southeast2:coms-aha-heroes-db

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # 1. Build and push the Docker image once; reuse the SHA-tagged image
  #    in both staging and production deploys.
  # ─────────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    outputs:
      image: ${{ steps.meta.outputs.image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Authenticate to GCP (Workload Identity Federation)
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Derive image URI from commit SHA
        id: meta
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/app:${{ github.event.workflow_run.head_sha }}"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.image }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────────────────────
  # 2. Migrate staging DB, then deploy the new image at 0% traffic tagged
  #    "staging" so it can be smoke-tested before production is touched.
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-staging:
    name: Migrate Staging & Deploy (0% Traffic)
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v3

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download Cloud SQL Auth Proxy
        run: |
          curl -fsSL -o cloud-sql-proxy \
            https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.14.1/cloud-sql-proxy.linux.amd64
          chmod +x cloud-sql-proxy

      - name: Read DB credentials from Secret Manager
        run: |
          DB_USER=$(gcloud secrets versions access latest --secret=coms-aha-heroes-db-user --project=${{ env.PROJECT_ID }})
          DB_PASSWORD=$(gcloud secrets versions access latest --secret=coms-aha-heroes-db-password --project=${{ env.PROJECT_ID }})
          echo "::add-mask::${DB_USER}"
          echo "::add-mask::${DB_PASSWORD}"
          # URL-encode the password (may contain special chars like !#$%&)
          DB_PASSWORD_ENCODED=$(bun -e "console.log(encodeURIComponent('${DB_PASSWORD//\'/\\\'}'))")
          echo "::add-mask::${DB_PASSWORD_ENCODED}"
          echo "DB_USER=${DB_USER}" >> "$GITHUB_ENV"
          echo "DB_PASSWORD_ENCODED=${DB_PASSWORD_ENCODED}" >> "$GITHUB_ENV"

      - name: Run Drizzle migrations → staging
        run: |
          # Start Auth Proxy; connects via TCP on localhost:5432
          ./cloud-sql-proxy --port 5432 "${{ env.DB_INSTANCE }}" &
          PROXY_PID=$!
          sleep 3

          DATABASE_URL="postgres://${DB_USER}:${DB_PASSWORD_ENCODED}@127.0.0.1:5432/coms_aha_heroes_staging" \
            bun run db:migrate

          kill "$PROXY_PID"

      - name: Deploy new image — 0% traffic, tag=staging
        run: |
          gcloud run deploy "${{ env.SERVICE }}" \
            --image "${{ needs.build-and-push.outputs.image }}" \
            --region "${{ env.REGION }}" \
            --service-account "coms-aha-heroes-run-sa@${{ env.PROJECT_ID }}.iam.gserviceaccount.com" \
            --add-cloudsql-instances "${{ env.DB_INSTANCE }}" \
            --no-traffic \
            --tag staging \
            --max-instances 1 \
            --set-secrets "DATABASE_URL=coms-aha-heroes-db-url-staging:latest,BETTER_AUTH_SECRET=coms-aha-heroes-auth-secret:latest,BETTER_AUTH_URL=coms-aha-heroes-auth-url:latest,GOOGLE_CLIENT_ID=coms-aha-heroes-google-client-id:latest,GOOGLE_CLIENT_SECRET=coms-aha-heroes-google-client-secret:latest,GOOGLE_SHEETS_SA_KEY=coms-aha-heroes-sheet-sync-sa-key:latest,PORTAL_INTROSPECT_SECRET=portal-introspect-secret:latest,PORTAL_WEBHOOK_SIGNING_SECRET=portal-webhook-signing-secret:latest,PORTAL_BROKER_SIGNING_SECRET=portal-broker-signing-secret:latest" \
            --set-env-vars "NODE_ENV=production,GCS_BUCKET=coms-aha-heroes-uploads,DB_POOL_MAX=2,GOOGLE_SHEET_ID_POINTS=1o_IdMKKO5BMbP_jhqPDcOie73KxSEt8AsT6XQ6dsWNU,GOOGLE_SHEET_ID_EMPLOYEES=1RS798qnTYwk8usogqjBaeYUTKQJMsONm4p1Cik92HYM,SHEET_TAB_EMPLOYEES=HEROES - Fulltime Staff,SHEET_TAB_BINTANG=Poin Bintang,SHEET_TAB_PENALTI=Poin Penalti,SHEET_TAB_POIN_AHA=Poin AHA,SHEET_TAB_REDEEM=Redeem Poin AHA,PORTAL_ORIGIN=${{ vars.PORTAL_ORIGIN }},PUBLIC_PORTAL_ORIGIN=${{ vars.PORTAL_ORIGIN }},PORTAL_APP_SLUG=heroes,PORTAL_TOKEN_AUDIENCE=portal:app:heroes" \
            --cpu-boost \
            --startup-probe="httpGet.path=/api/healthz,periodSeconds=5,failureThreshold=12,timeoutSeconds=3,initialDelaySeconds=0" \
            --quiet

      - name: Smoke test staging revision
        run: |
          STAGING_URL=$(
            gcloud run services describe "${{ env.SERVICE }}" \
              --region "${{ env.REGION }}" \
              --format=json \
            | jq -r '.. | objects | select(.tag? == "staging" and .url?) | .url' \
            | head -n1
          )

          for _ in $(seq 1 20); do
            if curl -fsS "${STAGING_URL%/}/api/healthz" | tee /tmp/staging-healthz.json | grep -q '"status":"ok"'; then
              break
            fi
            sleep 3
          done

          # Verify the SvelteKit bundle is serving: the root now 302s to the
          # portal sign-in (local /login was retired in 819e110). A 2xx/3xx
          # from / proves the adapter-bun handler mounted correctly.
          curl -fsS -o /dev/null -w '%{http_code}\n' "${STAGING_URL%/}/" \
            | grep -Eq '^(2|3)[0-9]{2}$'

  # ─────────────────────────────────────────────────────────────────────────────
  # 3. Manual gate — requires a reviewer to approve via the "production"
  #    GitHub Environment before production is touched.
  #    Configure required reviewers at:
  #    Settings → Environments → production → Required reviewers
  # ─────────────────────────────────────────────────────────────────────────────
  approve-production:
    name: Manual Approval — Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production

    steps:
      - name: Approved
        run: echo "Production deployment approved by ${{ github.actor }}."

  # ─────────────────────────────────────────────────────────────────────────────
  # 4. Migrate production DB, then redeploy the same image with the production
  #    DATABASE_URL and shift 100% of traffic to the new revision.
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-production:
    name: Migrate Production & Deploy (100% Traffic)
    runs-on: ubuntu-latest
    needs: [build-and-push, approve-production]

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v3

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download Cloud SQL Auth Proxy
        run: |
          curl -fsSL -o cloud-sql-proxy \
            https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.14.1/cloud-sql-proxy.linux.amd64
          chmod +x cloud-sql-proxy

      - name: Read DB credentials from Secret Manager
        run: |
          DB_USER=$(gcloud secrets versions access latest --secret=coms-aha-heroes-db-user --project=${{ env.PROJECT_ID }})
          DB_PASSWORD=$(gcloud secrets versions access latest --secret=coms-aha-heroes-db-password --project=${{ env.PROJECT_ID }})
          echo "::add-mask::${DB_USER}"
          echo "::add-mask::${DB_PASSWORD}"
          # URL-encode the password (may contain special chars like !#$%&)
          DB_PASSWORD_ENCODED=$(bun -e "console.log(encodeURIComponent('${DB_PASSWORD//\'/\\\'}'))")
          echo "::add-mask::${DB_PASSWORD_ENCODED}"
          echo "DB_USER=${DB_USER}" >> "$GITHUB_ENV"
          echo "DB_PASSWORD_ENCODED=${DB_PASSWORD_ENCODED}" >> "$GITHUB_ENV"

      - name: Run Drizzle migrations → production
        run: |
          ./cloud-sql-proxy --port 5432 "${{ env.DB_INSTANCE }}" &
          PROXY_PID=$!
          sleep 3

          DATABASE_URL="postgres://${DB_USER}:${DB_PASSWORD_ENCODED}@127.0.0.1:5432/coms_aha_heroes_production" \
            bun run db:migrate

          kill "$PROXY_PID"

      - name: Deploy to Cloud Run — 100% traffic
        run: |
          gcloud run deploy "${{ env.SERVICE }}" \
            --image "${{ needs.build-and-push.outputs.image }}" \
            --region "${{ env.REGION }}" \
            --service-account "coms-aha-heroes-run-sa@${{ env.PROJECT_ID }}.iam.gserviceaccount.com" \
            --add-cloudsql-instances "${{ env.DB_INSTANCE }}" \
            --set-secrets "DATABASE_URL=coms-aha-heroes-db-url-production:latest,BETTER_AUTH_SECRET=coms-aha-heroes-auth-secret:latest,BETTER_AUTH_URL=coms-aha-heroes-auth-url:latest,GOOGLE_CLIENT_ID=coms-aha-heroes-google-client-id:latest,GOOGLE_CLIENT_SECRET=coms-aha-heroes-google-client-secret:latest,GOOGLE_SHEETS_SA_KEY=coms-aha-heroes-sheet-sync-sa-key:latest,PORTAL_INTROSPECT_SECRET=portal-introspect-secret:latest,PORTAL_WEBHOOK_SIGNING_SECRET=portal-webhook-signing-secret:latest,PORTAL_BROKER_SIGNING_SECRET=portal-broker-signing-secret:latest" \
            --max-instances 2 \
            --set-env-vars "NODE_ENV=production,GCS_BUCKET=coms-aha-heroes-uploads,DB_POOL_MAX=15,GOOGLE_SHEET_ID_POINTS=1o_IdMKKO5BMbP_jhqPDcOie73KxSEt8AsT6XQ6dsWNU,GOOGLE_SHEET_ID_EMPLOYEES=1RS798qnTYwk8usogqjBaeYUTKQJMsONm4p1Cik92HYM,SHEET_TAB_EMPLOYEES=HEROES - Fulltime Staff,SHEET_TAB_BINTANG=Poin Bintang,SHEET_TAB_PENALTI=Poin Penalti,SHEET_TAB_POIN_AHA=Poin AHA,SHEET_TAB_REDEEM=Redeem Poin AHA,PORTAL_ORIGIN=${{ vars.PORTAL_ORIGIN }},PUBLIC_PORTAL_ORIGIN=${{ vars.PORTAL_ORIGIN }},PORTAL_APP_SLUG=heroes,PORTAL_TOKEN_AUDIENCE=portal:app:heroes" \
            --cpu-boost \
            --startup-probe="httpGet.path=/api/healthz,periodSeconds=5,failureThreshold=12,timeoutSeconds=3,initialDelaySeconds=0" \
            --quiet

          # Explicitly route all traffic to the new revision
          gcloud run services update-traffic "${{ env.SERVICE }}" \
            --region "${{ env.REGION }}" \
            --to-latest \
            --quiet
