name: Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE'
      - '.github/ISSUE_TEMPLATE/**'

# Cancel superseded runs on the same ref so a force-push or rapid follow-up
# commit doesn't keep an obsolete run burning a runner.
concurrency:
  group: deploy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false  # don't cancel mid-deploy

# Default to read-only; jobs that need WIF or more must opt in via job-level
# permissions. Keeps blast radius small if a step is ever compromised.
permissions:
  contents: read

env:
  PROJECT_ID: fbi-dev-484410
  REGION: asia-southeast2
  REGISTRY: asia-southeast2-docker.pkg.dev
  REPOSITORY: coms-aha-heroes-repo
  SERVICE: coms-aha-heroes-app
  # Full connection name used by Cloud SQL Auth Proxy and Cloud Run volume
  DB_INSTANCE: fbi-dev-484410:asia-southeast2:coms-aha-heroes-db

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # 0. Verify — same checks as ci.yml, but run in parallel with build-and-push
  #    so the Docker build and verification overlap. deploy-staging gates on
  #    all of them, so deployment safety is unchanged from the old workflow_run
  #    setup; we just stop running CI sequentially before Deploy.
  # ─────────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2
        with:
          bun-version: 1.3.13
      - name: Cache bun install
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Lint
        run: bun run lint

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2
        with:
          bun-version: 1.3.13
      - name: Cache bun install
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Type check
        run: bun run typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2
        with:
          bun-version: 1.3.13
      - name: Cache bun install
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Test
        run: bun test

  infra:
    name: OpenTofu Validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@fc711fa910b93cba0f3fbecaafc9f42fd0c411cb  # v2
      - name: OpenTofu init (no backend)
        run: tofu init -backend=false -input=false
      - name: OpenTofu validate
        run: tofu validate

  # ─────────────────────────────────────────────────────────────────────────────
  # 1. Build and push the Docker image once; reuse the SHA-tagged image
  #    in both staging and production deploys.
  # ─────────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # WIF needs to mint an OIDC token
    outputs:
      image: ${{ steps.meta.outputs.image }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Authenticate to GCP (Workload Identity Federation)
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093  # v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db  # v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Derive image URI from commit SHA
        id: meta
        run: |
          set -euo pipefail
          IMAGE="${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/app:${{ github.sha }}"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3

      - name: Build & push Docker image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.image }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────────────────────
  # 2. Migrate staging DB, then deploy the new image at 0% traffic tagged
  #    "staging" so it can be smoke-tested before production is touched.
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-staging:
    name: Migrate Staging & Deploy (0% Traffic)
    runs-on: ubuntu-latest
    # Gate on verify + build. Functionally equivalent to the old workflow_run
    # gate on CI: deployment never runs unless lint/typecheck/test/infra pass.
    needs: [lint, typecheck, test, infra, build-and-push]
    permissions:
      contents: read
      id-token: write  # WIF needs to mint an OIDC token

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Authenticate to GCP
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093  # v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db  # v3

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2
        with:
          bun-version: 1.3.13

      - name: Cache bun install
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download Cloud SQL Auth Proxy
        run: |
          set -euo pipefail
          curl -fsSL -o cloud-sql-proxy \
            https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.14.1/cloud-sql-proxy.linux.amd64
          chmod +x cloud-sql-proxy

      - name: Read DB credentials from Secret Manager
        run: |
          set -euo pipefail
          DB_USER=$(gcloud secrets versions access latest --secret=coms-aha-heroes-db-user --project=${{ env.PROJECT_ID }})
          DB_PASSWORD=$(gcloud secrets versions access latest --secret=coms-aha-heroes-db-password --project=${{ env.PROJECT_ID }})
          echo "::add-mask::${DB_USER}"
          echo "::add-mask::${DB_PASSWORD}"
          # URL-encode the password (may contain special chars like !#$%&)
          DB_PASSWORD_ENCODED=$(bun -e "console.log(encodeURIComponent('${DB_PASSWORD//\'/\\\'}'))")
          echo "::add-mask::${DB_PASSWORD_ENCODED}"
          echo "DB_USER=${DB_USER}" >> "$GITHUB_ENV"
          echo "DB_PASSWORD_ENCODED=${DB_PASSWORD_ENCODED}" >> "$GITHUB_ENV"

      - name: Run Drizzle migrations → staging
        run: |
          set -euo pipefail
          # Start Auth Proxy; connects via TCP on localhost:5432.
          # Trap on EXIT so the proxy is reaped even if the migration fails.
          ./cloud-sql-proxy --port 5432 "${{ env.DB_INSTANCE }}" &
          PROXY_PID=$!
          trap 'kill "$PROXY_PID" 2>/dev/null || true' EXIT
          sleep 3

          DATABASE_URL="postgres://${DB_USER}:${DB_PASSWORD_ENCODED}@127.0.0.1:5432/coms_aha_heroes_staging" \
            bun run db:migrate

      - name: Deploy new image — 0% traffic, tag=staging
        run: |
          gcloud run deploy "${{ env.SERVICE }}" \
            --image "${{ needs.build-and-push.outputs.image }}" \
            --region "${{ env.REGION }}" \
            --service-account "coms-aha-heroes-run-sa@${{ env.PROJECT_ID }}.iam.gserviceaccount.com" \
            --add-cloudsql-instances "${{ env.DB_INSTANCE }}" \
            --no-traffic \
            --tag staging \
            --max-instances 1 \
            --set-secrets "DATABASE_URL=coms-aha-heroes-db-url-staging:latest,BETTER_AUTH_SECRET=coms-aha-heroes-auth-secret:latest,BETTER_AUTH_URL=coms-aha-heroes-auth-url:latest,GOOGLE_CLIENT_ID=coms-aha-heroes-google-client-id:latest,GOOGLE_CLIENT_SECRET=coms-aha-heroes-google-client-secret:latest,GOOGLE_SHEETS_SA_KEY=coms-aha-heroes-sheet-sync-sa-key:latest" \
            --set-env-vars "NODE_ENV=production,GCS_BUCKET=coms-aha-heroes-uploads,DB_POOL_MAX=2,GOOGLE_SHEET_ID_POINTS=1o_IdMKKO5BMbP_jhqPDcOie73KxSEt8AsT6XQ6dsWNU,GOOGLE_SHEET_ID_EMPLOYEES=1RS798qnTYwk8usogqjBaeYUTKQJMsONm4p1Cik92HYM,SHEET_TAB_EMPLOYEES=HEROES - Fulltime Staff,SHEET_TAB_BINTANG=Poin Bintang,SHEET_TAB_PENALTI=Poin Penalti,SHEET_TAB_POIN_AHA=Poin AHA,SHEET_TAB_REDEEM=Redeem Poin AHA,PORTAL_ORIGIN=${{ vars.PORTAL_ORIGIN }},PUBLIC_PORTAL_ORIGIN=${{ vars.PORTAL_ORIGIN }},PORTAL_APP_SLUG=heroes,PORTAL_SERVICE_ACCOUNT_EMAIL=${{ vars.PORTAL_SERVICE_ACCOUNT_EMAIL }},SELF_PUBLIC_URL=https://coms-aha-heroes-app-45tyczfska-et.a.run.app,PUBLIC_APP_ORIGIN=https://coms-aha-heroes-app-45tyczfska-et.a.run.app" \
            --cpu-boost \
            --startup-probe="httpGet.path=/api/healthz,periodSeconds=5,failureThreshold=12,timeoutSeconds=3,initialDelaySeconds=0" \
            --quiet

      - name: Smoke test staging revision
        run: |
          set -euo pipefail
          STAGING_URL=$(
            gcloud run services describe "${{ env.SERVICE }}" \
              --region "${{ env.REGION }}" \
              --format=json \
            | jq -r '.. | objects | select(.tag? == "staging" and .url?) | .url' \
            | head -n1
          )

          healthz_ok=0
          for _ in $(seq 1 20); do
            if curl -fsS "${STAGING_URL%/}/api/healthz" | tee /tmp/staging-healthz.json | grep -q '"status":"ok"'; then
              healthz_ok=1
              break
            fi
            sleep 3
          done
          if [ "$healthz_ok" != "1" ]; then
            echo "::error::staging /api/healthz never returned status=ok within 20 attempts"
            exit 1
          fi

          # Verify the SvelteKit bundle is serving: the root now 302s to the
          # portal sign-in (local /login was retired in 819e110). A 2xx/3xx
          # from / proves the adapter-bun handler mounted correctly.
          curl -fsS -o /dev/null -w '%{http_code}\n' "${STAGING_URL%/}/" \
            | grep -Eq '^(2|3)[0-9]{2}$'

  # ─────────────────────────────────────────────────────────────────────────────
  # 2.5. Register the manifest with the portal (Rev 4 Spec 02 §HB).
  #
  # The manifest at packages/server/portal-manifest.ts is the source of
  # truth for Heroes' app_manifests row in the portal database. Idempotent
  # by design — the portal merges schemaVersion forward via GREATEST() and
  # rejects same-or-lower bumps with a no-op. Run after staging deploys
  # successfully so a broken manifest gates production behind the same
  # smoke-test fence everything else depends on.
  #
  # IAM requirement: the WIF service account must hold
  # roles/iam.serviceAccountTokenCreator on coms-aha-heroes-run-sa@... so
  # google-github-actions/auth can mint OIDC ID tokens whose `email` claim
  # matches the runtime SA the portal has registered for slug='heroes'.
  # ─────────────────────────────────────────────────────────────────────────────
  register-manifest:
    name: Register Heroes manifest with portal
    runs-on: ubuntu-latest
    needs: deploy-staging
    permissions:
      contents: read
      id-token: write  # WIF needs to mint an OIDC token

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Authenticate to GCP (impersonate runtime SA so the OIDC `email` claim matches the portal's registered serviceAccountEmail)
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093  # v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: coms-aha-heroes-run-sa@${{ env.PROJECT_ID }}.iam.gserviceaccount.com

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2
        with:
          bun-version: 1.3.13

      - name: Cache bun install
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Register manifest with portal
        working-directory: packages/server
        run: |
          set -euo pipefail
          bun x coms-portal-cli register-manifest \
            --portal-url "${{ vars.PORTAL_ORIGIN }}" \
            --app-slug heroes \
            --manifest ./portal-manifest.ts

  # ─────────────────────────────────────────────────────────────────────────────
  # 3. Manual gate — requires a reviewer to approve via the "production"
  #    GitHub Environment before production is touched.
  #    Configure required reviewers at:
  #    Settings → Environments → production → Required reviewers
  # ─────────────────────────────────────────────────────────────────────────────
  approve-production:
    name: Manual Approval — Production
    runs-on: ubuntu-latest
    needs: [deploy-staging, register-manifest]
    environment: production

    steps:
      - name: Approved
        run: echo "Production deployment approved by ${{ github.actor }}."

  # ─────────────────────────────────────────────────────────────────────────────
  # 4. Migrate production DB, then redeploy the same image with the production
  #    DATABASE_URL and shift 100% of traffic to the new revision.
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-production:
    name: Migrate Production & Deploy (100% Traffic)
    runs-on: ubuntu-latest
    needs: [build-and-push, approve-production]
    permissions:
      contents: read
      id-token: write  # WIF needs to mint an OIDC token

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Authenticate to GCP
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093  # v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db  # v3

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2
        with:
          bun-version: 1.3.13

      - name: Cache bun install
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download Cloud SQL Auth Proxy
        run: |
          set -euo pipefail
          curl -fsSL -o cloud-sql-proxy \
            https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.14.1/cloud-sql-proxy.linux.amd64
          chmod +x cloud-sql-proxy

      - name: Read DB credentials from Secret Manager
        run: |
          set -euo pipefail
          DB_USER=$(gcloud secrets versions access latest --secret=coms-aha-heroes-db-user --project=${{ env.PROJECT_ID }})
          DB_PASSWORD=$(gcloud secrets versions access latest --secret=coms-aha-heroes-db-password --project=${{ env.PROJECT_ID }})
          echo "::add-mask::${DB_USER}"
          echo "::add-mask::${DB_PASSWORD}"
          # URL-encode the password (may contain special chars like !#$%&)
          DB_PASSWORD_ENCODED=$(bun -e "console.log(encodeURIComponent('${DB_PASSWORD//\'/\\\'}'))")
          echo "::add-mask::${DB_PASSWORD_ENCODED}"
          echo "DB_USER=${DB_USER}" >> "$GITHUB_ENV"
          echo "DB_PASSWORD_ENCODED=${DB_PASSWORD_ENCODED}" >> "$GITHUB_ENV"

      - name: Run Drizzle migrations → production
        run: |
          set -euo pipefail
          ./cloud-sql-proxy --port 5432 "${{ env.DB_INSTANCE }}" &
          PROXY_PID=$!
          trap 'kill "$PROXY_PID" 2>/dev/null || true' EXIT
          sleep 3

          DATABASE_URL="postgres://${DB_USER}:${DB_PASSWORD_ENCODED}@127.0.0.1:5432/coms_aha_heroes_production" \
            bun run db:migrate

      - name: Deploy to Cloud Run — 100% traffic
        run: |
          gcloud run deploy "${{ env.SERVICE }}" \
            --image "${{ needs.build-and-push.outputs.image }}" \
            --region "${{ env.REGION }}" \
            --service-account "coms-aha-heroes-run-sa@${{ env.PROJECT_ID }}.iam.gserviceaccount.com" \
            --add-cloudsql-instances "${{ env.DB_INSTANCE }}" \
            --set-secrets "DATABASE_URL=coms-aha-heroes-db-url-production:latest,BETTER_AUTH_SECRET=coms-aha-heroes-auth-secret:latest,BETTER_AUTH_URL=coms-aha-heroes-auth-url:latest,GOOGLE_CLIENT_ID=coms-aha-heroes-google-client-id:latest,GOOGLE_CLIENT_SECRET=coms-aha-heroes-google-client-secret:latest,GOOGLE_SHEETS_SA_KEY=coms-aha-heroes-sheet-sync-sa-key:latest" \
            --max-instances 2 \
            --set-env-vars "NODE_ENV=production,GCS_BUCKET=coms-aha-heroes-uploads,DB_POOL_MAX=15,GOOGLE_SHEET_ID_POINTS=1o_IdMKKO5BMbP_jhqPDcOie73KxSEt8AsT6XQ6dsWNU,GOOGLE_SHEET_ID_EMPLOYEES=1RS798qnTYwk8usogqjBaeYUTKQJMsONm4p1Cik92HYM,SHEET_TAB_EMPLOYEES=HEROES - Fulltime Staff,SHEET_TAB_BINTANG=Poin Bintang,SHEET_TAB_PENALTI=Poin Penalti,SHEET_TAB_POIN_AHA=Poin AHA,SHEET_TAB_REDEEM=Redeem Poin AHA,PORTAL_ORIGIN=${{ vars.PORTAL_ORIGIN }},PUBLIC_PORTAL_ORIGIN=${{ vars.PORTAL_ORIGIN }},PORTAL_APP_SLUG=heroes,PORTAL_SERVICE_ACCOUNT_EMAIL=${{ vars.PORTAL_SERVICE_ACCOUNT_EMAIL }},SELF_PUBLIC_URL=https://coms-aha-heroes-app-45tyczfska-et.a.run.app,PUBLIC_APP_ORIGIN=https://coms-aha-heroes-app-45tyczfska-et.a.run.app" \
            --cpu-boost \
            --startup-probe="httpGet.path=/api/healthz,periodSeconds=5,failureThreshold=12,timeoutSeconds=3,initialDelaySeconds=0" \
            --quiet

          # Explicitly route all traffic to the new revision
          gcloud run services update-traffic "${{ env.SERVICE }}" \
            --region "${{ env.REGION }}" \
            --to-latest \
            --quiet
